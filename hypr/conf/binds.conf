# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

# SUPER key
$mainMod = SUPER

# >>> General

# >> Window Management
bind = $mainMod, C, killactive, # Close current window
bind = $mainMod, TAB, togglefloating, # Toggle between tiling and floating window
bind = $mainMod, RETURN, fullscreen, 1 # Open the window in fullscreen
bind = $mainMod SHIFT, RETURN, fullscreen, # Toggle fullscreen
bind = $mainMod, N, pseudo, # Pseudo float
bind = $mainMod, J, togglesplit, # Toggle dwindle split

# >> Focus Navigation
bind = $mainMod, left, movefocus, l # Move focus left
bind = $mainMod, right, movefocus, r # Move focus right
bind = $mainMod, up, movefocus, u # Move focus up
bind = $mainMod, down, movefocus, d # Move focus down

# >> Applications
bind = $mainMod, T, exec, kitty # Open kitty
bind = $mainMod, E, exec, vivaldi # Opens the filemanager
#bind = $mainMod, SPACE, exec, rofi -show drun # Open rofi
bind = $mainMod, P, exec, dolphin # Opens the browser

# >> System
bind = $mainMod, M, exit, # Exit Hyprland
bind = $mainMod SHIFT, B, exec, ~/.config/hypr/scripts/reload-waybar.sh # Reload Waybar
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/reload-hyprpaper.sh # Random wallpaper

# >>> Quickshell

# >> Overview & Tools
bind = ALT, TAB, global, quickshell:hyprview # Open Windows and Navigate to next
binde = ALT, TAB, exec, qs ipc -p .config/quickshell/archdt call hyprview next # [hidden]
bind = ALT_SHIFT, TAB, exec, qs ipc -p .config/quickshell/archdt call hyprview prev # Previous window
bindrt = ALT, ALT_L, exec, qs ipc -p .config/quickshell/archdt call hyprview release # [hidden] 
bindrt = ALT, ALT_R, exec, qs ipc -p .config/quickshell/archdt call hyprview release # [hidden] 
bind = $mainMod, SPACE, global, quickshell:overviewSearchToggle # Toggle Launcher
bind = $mainMod, Slash, global, quickshell:cheatsheetToggle # Toggle cheatsheet
bind = $mainMod, V, global, quickshell:overviewClipboardToggle # Toggle clipboard
bind = $mainMod, period, global, quickshell:overviewEmojiToggle # Toggle Emojis
# >> Screenshots
bind = $mainMod SHIFT, S, global, quickshell:regionScreenshot # Screenshot
bind = $mainMod SHIFT, R, global, quickshell:regionRecord # Screen Record
bind = $mainMod CTRL SHIFT, R, global, quickshell:regionRecordWithSound # Screen Record with audio
#/# bind = $mainMod SHIFT, R,, # Stop Recording
# >>> Workspaces

# >> Switch Workspace
#/# bind = $mainMod +, Hash,, # Switch to workspace # (1, 2, 3,...)
bind = $mainMod, 1, workspace, 1 # [hidden]
bind = $mainMod, 2, workspace, 2 # [hidden]
bind = $mainMod, 3, workspace, 3 # [hidden]
bind = $mainMod, 4, workspace, 4 # [hidden]
bind = $mainMod, 5, workspace, 5 # [hidden]
bind = $mainMod, 6, workspace, 6 # [hidden]
bind = $mainMod, 7, workspace, 7 # [hidden]
bind = $mainMod, 8, workspace, 8 # [hidden]
bind = $mainMod, 9, workspace, 9 # [hidden]
bind = $mainMod, 0, workspace, 10 # [hidden]

# >> Move to Workspace
#/# bind = $mainMod SHIFT, Hash,, # Move window to workspace # (1, 2, 3,...)
bind = $mainMod SHIFT, 1, movetoworkspace, 1 # [hidden] 
bind = $mainMod SHIFT, 2, movetoworkspace, 2 # [hidden] 
bind = $mainMod SHIFT, 3, movetoworkspace, 3 # [hidden] 
bind = $mainMod SHIFT, 4, movetoworkspace, 4 # [hidden] 
bind = $mainMod SHIFT, 5, movetoworkspace, 5 # [hidden] 
bind = $mainMod SHIFT, 6, movetoworkspace, 6 # [hidden] 
bind = $mainMod SHIFT, 7, movetoworkspace, 7 # [hidden] 
bind = $mainMod SHIFT, 8, movetoworkspace, 8 # [hidden] 
bind = $mainMod SHIFT, 9, movetoworkspace, 9 # [hidden] 
bind = $mainMod SHIFT, 0, movetoworkspace, 10 # [hidden] 

# >> Scroll Workspaces
bind = $mainMod, mouse_down, workspace, e+1 # Scroll workspaces down
bind = $mainMod, mouse_up, workspace, e-1 # Scroll workspaces up

# >>> Media & Hardware

# >> Media Control
bind = CTRL ALT, 0, exec, playerctl previous # Previous track
bind = CTRL ALT, Minus, exec, playerctl play-pause # Play/pause media
bind = CTRL ALT, Equal, exec, playerctl next # Next track

# >> Volume & Brightness
bind = CTRL SHIFT, Equal, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+ # Volume up
bind = CTRL SHIFT, Minus, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%- # Volume down

# >> Keyboard Controls
bind = CTRL ALT SHIFT, 1, exec, ~/.config/hypr/scripts/k500KM.sh Full # Keyboard profile: Full
bind = CTRL ALT SHIFT, 2, exec, ~/.config/hypr/scripts/k500KM.sh Setas # Keyboard profile: Setas

# >>> Mouse

# >> Window Actions
bindm = $mainMod, mouse:272, movewindow # Move window
bindm = $mainMod, mouse:273, resizewindow # Resize window
