# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrule = opacity 0.9, match:class code
windowrule = opacity 0.8, match:class org.gnome.TextEditor
windowrule = opacity 0.8, match:class org.pulseaudio.pavucontrol
windowrule = opacity 0.9, match:class Simplenote
windowrulev2 = float,title:(Picture in picture)
windowrulev2 = pin,title:(Picture in picture)